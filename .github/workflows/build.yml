name: Build OrangeFox 15.1 (Android 15)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: false

      - name: Setup Swap Space
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 12

      - name: Checkout Device Tree
        uses: actions/checkout@v4
        with:
          path: goya_tree

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git-core curl python3 python-is-python3 zip unzip bc cpio rsync flex bison wget libssl-dev libncurses-dev lz4 zlib1g-dev openjdk-17-jdk build-essential
          sudo curl https://storage.googleapis.com/git-repo-downloads/repo -o /usr/local/bin/repo
          sudo chmod a+rx /usr/local/bin/repo

      - name: Sync OrangeFox 15.1 (IL VERO SALTO GENERAZIONALE)
        run: |
          git config --global user.name "Builder"
          git config --global user.email "build@example.com"
          mkdir -p /home/runner/workspace
          cd /home/runner/workspace
          git clone https://gitlab.com/OrangeFox/sync.git
          cd sync
          # Chiamiamo il branch 15.1 per la compatibilità con HyperOS 2!
          ./orangefox_sync.sh --branch 15.1 --path /home/runner/workspace
          rm -rf /home/runner/workspace/.repo

      - name: Move Device Tree & Update AndroidProducts
        run: |
          mkdir -p /home/runner/workspace/device/xiaomi/goya
          cp -r $GITHUB_WORKSPACE/goya_tree/* /home/runner/workspace/device/xiaomi/goya/
          
          # Aggiorniamo le versioni per Android 15 (ap3a)
          cat << 'EOF' > /home/runner/workspace/device/xiaomi/goya/AndroidProducts.mk
          PRODUCT_MAKEFILES := $(LOCAL_DIR)/twrp_goya.mk
          COMMON_LUNCH_CHOICES := twrp_goya-ap3a-eng twrp_goya-trunk_staging-eng
          EOF

      - name: Build OrangeFox 15.1
        run: |
          cd /home/runner/workspace
          export ALLOW_MISSING_DEPENDENCIES=true
          export FOX_BUILD_DEVICE=goya
          export LC_ALL="C"
          source build/envsetup.sh
          # Usiamo il tag di Android 15
          lunch twrp_goya-ap3a-eng || lunch twrp_goya-trunk_staging-eng
          mka adbd vendorbootimage || true

      - name: INCONTROVERTIBLE RAMDISK EXTRACTION
        run: |
          cd /home/runner/workspace/out/target/product/goya/recovery/root
          find . | cpio -H newc -o > /home/runner/workspace/fox_ramdisk_15.1.cpio

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OrangeFox-15.1-Ramdisk
          path: /home/runner/workspace/fox_ramdisk_15.1.cpio
