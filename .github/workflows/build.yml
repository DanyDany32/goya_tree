name: Build OrangeFox 14.1

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: false

      - name: Setup Swap Space
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 16

      - name: Checkout Device Tree
        uses: actions/checkout@v4
        with:
          path: goya_tree

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git-core curl python3 python-is-python3 zip unzip bc cpio rsync flex bison wget libssl-dev libncurses-dev lz4 zlib1g-dev openjdk-17-jdk build-essential
          sudo curl https://storage.googleapis.com/git-repo-downloads/repo -o /usr/local/bin/repo
          sudo chmod a+rx /usr/local/bin/repo

      - name: Sync OrangeFox 14.1
        run: |
          git config --global user.name "Builder"
          git config --global user.email "build@example.com"
          mkdir ~/workspace
          cd ~/workspace
          git clone https://gitlab.com/OrangeFox/sync.git
          cd sync
          ./orangefox_sync.sh --branch 14.1 --path ~/workspace

      - name: Move Device Tree and Apply Fixes
        run: |
          mkdir -p ~/workspace/device/xiaomi/goya
          cp -r $GITHUB_WORKSPACE/goya_tree/* ~/workspace/device/xiaomi/goya/
          
          # 1. Eliminiamo le cartelle fisiche caricate per sbaglio che causano l'errore
          rm -rf ~/workspace/device/xiaomi/goya/recovery/root/vendor
          rm -rf ~/workspace/device/xiaomi/goya/recovery/root/product
          rm -rf ~/workspace/device/xiaomi/goya/recovery/root/system_ext
          rm -rf ~/workspace/device/xiaomi/goya/recovery/root/odm
          
          # 2. LA MAGIA: Patch per forzare l'ignoramento dei conflitti di symlink in rsync
          sed -i 's/rsync -a --exclude=sdcard/rsync -a --keep-dirlinks --exclude=sdcard/g' ~/workspace/vendor/recovery/core_makefile.mk || true
          sed -i 's/rsync -a --exclude=sdcard/rsync -a --keep-dirlinks --exclude=sdcard/g' ~/workspace/bootable/recovery/Android.mk || true

      - name: Build OrangeFox
        run: |
          cd ~/workspace
          export ALLOW_MISSING_DEPENDENCIES=true
          export FOX_BUILD_DEVICE=goya
          export LC_ALL="C"
          source build/envsetup.sh
          lunch twrp_goya-ap2a-eng
          mka adbd vendorbootimage

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OrangeFox-15T-Ramdisk
          path: |
            ~/workspace/out/target/product/goya/ramdisk-recovery.img
            ~/workspace/out/target/product/goya/vendor_boot.img
